upstream worklex_backend {

    server worklex_backend:8000;

}

upstream worklex_frontend {

    server worklex_frontend:5173;

}

server {

    listen 80;

    server_name worklex.sena.edu.co;

    location /.well-known/acme-challenge/ {

        root /var/www/certbot;

    }

    location / {

        return 301 https://$host$request_uri;

    }

}

server {

    listen 443 ssl http2;

    server_name worklex.sena.edu.co;

    ssl_certificate /etc/letsencrypt/live/worklex.sena.edu.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/worklex.sena.edu.co/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    limit_req zone=api_limit burst=20 nodelay;
    limit_conn addr 50;

    location / {

        proxy_pass http://worklex_app;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }

}