services:

  worklex_proxy:

    image: owasp/modsecurity-crs:nginx

    container_name: worklex_proxy

    restart: unless-stopped

    ports:
      - "80:80"
      - "443:443"

    volumes:

      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro

      - ./proxy/conf.d:/etc/nginx/conf.d:ro

      - ./proxy/modsecurity:/etc/modsecurity.d:ro

      - ./proxy/logs:/var/log/nginx

      - ./certbot/conf:/etc/letsencrypt

      - ./certbot/www:/var/www/certbot

    networks:
      - worklex_network

    security_opt:
      - no-new-privileges:true

    cap_drop:
      - NET_RAW

    read_only: false

    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run

    healthcheck:

      test: ["CMD-SHELL", "nginx -t || exit 1"]

      interval: 30s

      timeout: 10s

      retries: 3

    logging:

      driver: json-file

      options:
        max-size: "50m"
        max-file: "5"

  worklex_certbot:

    image: certbot/certbot

    container_name: worklex_certbot
    
    command: >
      sh -c "while :; do
      certbot renew;
      sleep 12h;
      done"

    restart: unless-stopped

    volumes:

      - ./certbot/conf:/etc/letsencrypt

      - ./certbot/www:/var/www/certbot

    depends_on:
      - worklex_proxy

    networks:
      - worklex_network

#volumes:

# Preparado para futuras expansiones
#    worklex_logs:

networks:

  worklex_network:
    external: true